source_type: MySQL
sink_type: Dameng

source_config:
  - host: 127.0.0.1
    port: 3306
    username: cdc_user
    password: cdc_password
    database: source_db
    table_name: "*"
    server_id: 10003

sink_config:
  - host: 127.0.0.1
    port: 5236
    username: SYSDBA
    password: SYSDBA
    database: TARGET_SCHEMA

auto_create_database: true  # Dameng: creates target schema when missing
auto_create_table: true
auto_add_column: true
sync_stored_procedure: false  # 基础转换并同步 MySQL 存储过程/函数到 Dameng
overwrite_stored_procedure: false
log_level: info
