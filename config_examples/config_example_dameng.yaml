source_type: MySQL
sink_type: Dameng

source_config:
  - host: 127.0.0.1
    port: 3306
    username: cdc_user
    password: cdc_password
    database: source_db
    table_name: "*"
    server_id: 10003

sink_config:
  - host: 127.0.0.1
    port: 5236
    username: SYSDBA
    password: SYSDBA
    database: TARGET_SCHEMA
    init_insert_batch_rows: 16  # 初始化数据写入时合并多行 INSERT，默认 16
    flush_interval_secs: 5      # 定时 flush 间隔，默认 5 秒

auto_create_database: true  # Dameng: creates target schema when missing
auto_create_table: true
auto_add_column: true
sync_stored_procedure: false  # 基础转换并同步 MySQL 存储过程/函数到 Dameng
sync_stored_view: true         # 同步 MySQL 视图到 Dameng，目标已存在同名视图时跳过
overwrite_stored_procedure: false
random_check_data_after_init: false
random_check_data_after_init_batch_size_min: 10
log_level: info
log_file:
  enabled: false
  dir: /app/logs
  file_name: rust_cdc_hub.log
  max_size_mb: 100
  retention_days: 30
  max_backup_files: 300
  compress_gzip: true
